name: Build and Release Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Clean up old wrapper files
        run: find . -name "gradle-wrapper.jar" -type f -delete

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.3.1

      - name: Generate Version Info
        id: versioning
        run: |
          VERSION_CODE=$(date +%s)
          VERSION_NAME="1.0.${{ github.run_number }}"
          
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "tag_name=v$VERSION_NAME" >> $GITHUB_OUTPUT
          
          echo "Generated version: $VERSION_NAME (Code: $VERSION_CODE)"

      - name: Setup Keystore
        run: |
          echo "" > debug.keystore.base64
          base64 -d debug.keystore.base64 > debug.keystore

      - name: Build Debug APK
        run: |
          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            ./gradlew assembleDebug
          else
            gradle assembleDebug
          fi

      - name: Rename APK
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug/ -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "APK not found!"
            exit 1
          fi
          mv "$APK_PATH" "Cihan Öğretmen.apk"
          echo "APK created and renamed: Cihan Öğretmen.apk"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.versioning.outputs.tag_name }}
          name: Sürüm ${{ steps.versioning.outputs.tag_name }}
          files: "Cihan Öğretmen.apk"
          generate_release_notes: true
          draft: false
          prerelease: false
